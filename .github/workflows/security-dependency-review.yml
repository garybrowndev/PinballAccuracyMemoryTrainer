name: 'Security: Dependency Review'

on:
  pull_request:
    branches:
      - master

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  security-dependency-review:
    name: 'Security: Dependency Review'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        id: review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Fail on low and above severity vulnerabilities
          fail-on-severity: low
          # Comment on PR with vulnerability summary
          comment-summary-in-pr: never
          # Deny specific licenses (optional - uncomment if needed)
          # deny-licenses: GPL-3.0, AGPL-3.0

      - name: Generate Report
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const report = {
              dependency_changes: ${{ steps.review.outputs.dependency-changes || '[]' }},
              vulnerable_changes: ${{ steps.review.outputs.vulnerable-changes || '[]' }},
              invalid_license_changes: ${{ steps.review.outputs.invalid-license-changes || '[]' }},
              denied_changes: ${{ steps.review.outputs.denied-changes || '[]' }}
            };
            fs.writeFileSync('dependency-review-report.json', JSON.stringify(report, null, 2));

      - name: Upload Dependency Review Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dependency-review-report
          path: dependency-review-report.json

      - name: Update PR Comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const updateComment = require('./.github/scripts/update-pr-comment.cjs');

            let body = 'Dependency review failed or did not run correctly.';
            try {
              if (fs.existsSync('dependency-review-report.json')) {
                const report = JSON.parse(fs.readFileSync('dependency-review-report.json', 'utf8'));
                const vulnerable = report.vulnerable_changes ? report.vulnerable_changes.length : 0;
                const denied = report.denied_changes ? report.denied_changes.length : 0;
                
                if (vulnerable === 0 && denied === 0) {
                  body = '✅ No vulnerabilities or denied packages found.';
                } else {
                  body = `❌ **Vulnerabilities Found**: ${vulnerable}\n❌ **Denied Packages**: ${denied}\n\nPlease check the [Dependency Review Report artifact] for details.`;
                }
              }
            } catch (e) {
              console.error(e);
            }

            await updateComment({
              github,
              context,
              header: 'Dependency Review',
              body,
              workflowYaml: 'security-dependency-review.yml'
            });

      - name: Generate job summary
        if: always()
        run: |
          echo "## 🛡️ Dependency Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.review.outcome }}" == "success" ]; then
            echo "✅ No new vulnerabilities found (or they are below the severity threshold)." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Vulnerabilities detected or check failed." >> $GITHUB_STEP_SUMMARY
            echo "Please check the PR comments for details." >> $GITHUB_STEP_SUMMARY
          fi
