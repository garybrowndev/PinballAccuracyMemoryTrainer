name: 'CD: Deploy PR Preview'

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cd-deploy-pr-preview:
    name: 'CD: Deploy PR Preview'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build standalone HTML
        run: npm run build:standalone

      - name: Prepare deployment directory
        run: |
          # Create deployment directory and copy standalone build as index.html
          mkdir -p deploy
          cp dist-standalone/pinball-trainer-standalone.html deploy/index.html

      - name: Deploy to Surge.sh (Preview)
        id: deploy
        run: |
          # Generate unique preview URL
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_URL="pinball-trainer-pr-${PR_NUMBER}.surge.sh"

          # Deploy to surge using npx with pinned version (avoids global install)
          npx surge@0.24.6 ./deploy $PREVIEW_URL --token ${{ secrets.SURGE_TOKEN }}

          echo "preview_url=https://$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Check Surge.sh service availability
        id: surge-status
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          echo "🔍 Checking if Surge.sh is accessible..."

          # Check if surge.sh main site responds
          if timeout 10 curl -sf https://surge.sh > /dev/null 2>&1; then
            echo "✅ Surge.sh is accessible"
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  WARNING: Surge.sh appears to be down or inaccessible"
            echo "available=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Wait for Surge deployment to propagate
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: |
          echo "⏳ Waiting 60 seconds for Surge deployment to propagate..."
          sleep 60

      - name: Validate Surge deployment
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: |
          SITE_URL="${{ steps.deploy.outputs.preview_url }}"
          echo "🔍 Validating deployment at $SITE_URL"

          # Fetch the page
          HTTP_CODE=$(curl -s -o /tmp/surge-deploy.html -w "%{http_code}" "$SITE_URL")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ ERROR: Site returned HTTP $HTTP_CODE instead of 200"
            exit 1
          fi

          echo "✅ Site returned HTTP 200"

          # Check for actual 404 error page (in title or heading, not in JavaScript code)
          if grep -E "<title>[^<]*404[^<]*</title>" /tmp/surge-deploy.html > /dev/null || grep -E "<h[1-6][^>]*>[^<]*404.*Not Found[^<]*</h[1-6]>" /tmp/surge-deploy.html > /dev/null; then
            echo "❌ ERROR: Page appears to be a 404 error page"
            head -n 50 /tmp/surge-deploy.html
            exit 1
          fi

          # Check for external script references that might 404
          EXTERNAL_SCRIPTS=$(grep -o 'src="[^"]*\.js"' /tmp/surge-deploy.html || true)
          if [ ! -z "$EXTERNAL_SCRIPTS" ]; then
            echo "⚠️  WARNING: Found external script references in standalone HTML:"
            echo "$EXTERNAL_SCRIPTS"
            echo "❌ ERROR: Standalone build should not have external script references"
            exit 1
          fi

          # Check for external CSS references
          EXTERNAL_CSS=$(grep -o 'href="[^"]*\.css"' /tmp/surge-deploy.html || true)
          if [ ! -z "$EXTERNAL_CSS" ]; then
            echo "⚠️  WARNING: Found external CSS references in standalone HTML:"
            echo "$EXTERNAL_CSS"
            echo "❌ ERROR: Standalone build should not have external CSS references"
            exit 1
          fi

          # Check that there's actually some content
          FILE_SIZE=$(wc -c < /tmp/surge-deploy.html)
          if [ "$FILE_SIZE" -lt 100000 ]; then
            echo "❌ ERROR: Page size is suspiciously small ($FILE_SIZE bytes)"
            echo "Expected at least 100KB for standalone HTML with embedded assets"
            exit 1
          fi

          echo "✅ Page size: $FILE_SIZE bytes"
          echo "✅ No external script/CSS references found"
          echo "✅ Surge deployment validated successfully!"

      - name: Run Lighthouse audit on Surge preview (mobile)
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npm run lhci:mobile -- ${{ steps.deploy.outputs.preview_url }}

      - name: Assert Lighthouse thresholds (mobile)
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        env:
          LIGHTHOUSE_URL: ${{ steps.deploy.outputs.preview_url }}
        run: npx lhci assert --config=config/lighthouse/mobile.config.cjs

      - name: Upload mobile results to temporary public storage
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npx lhci upload --config=config/lighthouse/mobile.config.cjs | tee lhci-upload-surge-mobile.log

      - name: Save mobile results to filesystem (artifacts)
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npx lhci upload --target=filesystem --outputDir=.lighthouseci/surge-mobile

      - name: Extract mobile metadata
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: node scripts/lighthouse-metadata.cjs mobile lhci-upload-surge-mobile.log surge-mobile > lighthouse-surge-mobile-metadata.json

      - name: Debug - Display mobile metadata JSON
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: |
          echo "=== Lighthouse Surge Mobile Metadata ==="
          cat lighthouse-surge-mobile-metadata.json
          echo "========================================="

      - name: Generate mobile job summary
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: node scripts/lighthouse-report-markdown.cjs lighthouse-surge-mobile-metadata.json >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse mobile artifacts
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-surge-mobile-results
          path: .lighthouseci/surge-mobile/
          retention-days: 30

      - name: Run Lighthouse audit on Surge preview (desktop)
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npm run lhci:desktop -- ${{ steps.deploy.outputs.preview_url }}

      - name: Assert Lighthouse thresholds (desktop)
        if: steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        env:
          LIGHTHOUSE_URL: ${{ steps.deploy.outputs.preview_url }}
        run: npx lhci assert --config=config/lighthouse/desktop.config.cjs

      - name: Upload desktop results to temporary public storage
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npx lhci upload --config=config/lighthouse/desktop.config.cjs | tee lhci-upload-surge-desktop.log

      - name: Save desktop results to filesystem (artifacts)
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: npx lhci upload --target=filesystem --outputDir=.lighthouseci/surge-desktop

      - name: Extract desktop metadata
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: node scripts/lighthouse-metadata.cjs desktop lhci-upload-surge-desktop.log surge-desktop > lighthouse-surge-desktop-metadata.json

      - name: Debug - Display desktop metadata JSON
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: |
          echo "=== Lighthouse Surge Desktop Metadata ==="
          cat lighthouse-surge-desktop-metadata.json
          echo "=========================================="

      - name: Generate desktop job summary
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        run: node scripts/lighthouse-report-markdown.cjs lighthouse-surge-desktop-metadata.json >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse desktop artifacts
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-surge-desktop-results
          path: .lighthouseci/surge-desktop/
          retention-days: 30

      - name: Comment on PR with mobile Lighthouse results
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const metadataJson = fs.readFileSync('lighthouse-surge-mobile-metadata.json', 'utf8');
            const metadata = JSON.parse(metadataJson);
            const { url, scores, directReportUrl, comparisonReportUrl } = metadata;

            let reportLinks = '';
            if (directReportUrl) {
              reportLinks += `- [📊 Direct Report](${directReportUrl})\n`;
            }
            if (comparisonReportUrl) {
              reportLinks += `- [🔄 Comparison Report](${comparisonReportUrl})`;
            }
            if (!directReportUrl && !comparisonReportUrl) {
              reportLinks = 'Report URLs not available';
            }

            const comment = `### 📱 Mobile Lighthouse Results

            **Tested URL:** ${url}

            | Metric | Score |
            |--------|-------|
            | Performance | ${(scores.performance * 100).toFixed(0)}% |
            | Accessibility | ${(scores.accessibility * 100).toFixed(0)}% |
            | Best Practices | ${(scores.bestPractices * 100).toFixed(0)}% |
            | SEO | ${(scores.seo * 100).toFixed(0)}% |

            **Reports:**
            ${reportLinks}`;

            const updateComment = require('./.github/scripts/update-pr-comment.cjs');
            await updateComment({
              github,
              context,
              header: 'Lighthouse Audit - Surge Mobile',
              body: comment,
              workflowYaml: 'cd-deploy-pr-preview.yml'
            });

      - name: Comment on PR with desktop Lighthouse results
        if: always() && steps.deploy.outcome == 'success' && steps.surge-status.outputs.available == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const metadataJson = fs.readFileSync('lighthouse-surge-desktop-metadata.json', 'utf8');
            const metadata = JSON.parse(metadataJson);
            const { url, scores, directReportUrl, comparisonReportUrl } = metadata;

            let reportLinks = '';
            if (directReportUrl) {
              reportLinks += `- [📊 Direct Report](${directReportUrl})\n`;
            }
            if (comparisonReportUrl) {
              reportLinks += `- [🔄 Comparison Report](${comparisonReportUrl})`;
            }
            if (!directReportUrl && !comparisonReportUrl) {
              reportLinks = 'Report URLs not available';
            }

            const comment = `### 🖥️ Desktop Lighthouse Results

            **Tested URL:** ${url}

            | Metric | Score |
            |--------|-------|
            | Performance | ${(scores.performance * 100).toFixed(0)}% |
            | Accessibility | ${(scores.accessibility * 100).toFixed(0)}% |
            | Best Practices | ${(scores.bestPractices * 100).toFixed(0)}% |
            | SEO | ${(scores.seo * 100).toFixed(0)}% |

            **Reports:**
            ${reportLinks}`;

            const updateComment = require('./.github/scripts/update-pr-comment.cjs');
            await updateComment({
              github,
              context,
              header: 'Lighthouse Audit - Surge Desktop',
              body: comment,
              workflowYaml: 'cd-deploy-pr-preview.yml'
            });

      - name: Report service unavailability
        if: steps.deploy.outcome == 'success' && steps.surge-status.outcome == 'failure'
        run: |
          echo "⚠️  WARNING: Surge.sh service appears to be unavailable"
          echo "📦 Deployment was published, but validation was skipped"
          echo "🔗 Preview URL: ${{ steps.deploy.outputs.preview_url }}"
          echo ""
          echo "This is not a failure of the deployment process."
          echo "The site may become accessible once Surge.sh service is restored."
          echo ""
          echo "::warning title=Surge.sh Validation Skipped::Surge.sh service is currently unavailable. Deployment succeeded but could not be validated. Manual verification recommended."

      - name: Comment on PR with validation status
        if: steps.deploy.outcome == 'success' && steps.surge-status.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### ⚠️ Surge.sh Validation Skipped\n\nDeployment succeeded but validation was skipped because Surge.sh is currently unavailable.\n\n**Recommendation**: Manually verify the deployment when the service is back online.'
            })

      - name: Add label for skipped validation
        if: steps.deploy.outcome == 'success' && steps.surge-status.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['surge-validation-skipped']
              })
            } catch (error) {
              console.log('Could not add label, possibly due to permissions or label missing. Continuing.')
            }

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const updateComment = require('./.github/scripts/update-pr-comment.cjs');
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const surgeAvailable = '${{ steps.surge-status.outputs.available }}' === 'true';

            let comment;
            if (surgeAvailable) {
              comment = `Your preview deployment is ready!

            🔗 **Preview URL:** ${previewUrl}

            ### What's included:
            - ✅ Standalone HTML build (same as production)
            - ✅ All assets embedded inline
            - ✅ Fully offline-capable
            - ✅ Production optimizations

            ### Testing checklist:
            - [ ] Test dark mode toggle
            - [ ] Test preset loading
            - [ ] Test practice mode
            - [ ] Test recall mode
            - [ ] Test PWA install prompt
            - [ ] Test offline functionality

            *Preview will be updated on each new commit to this PR.*

            ---
            *Deployed at ${new Date().toISOString()}*`;
            } else {
              comment = `⚠️  **Preview deployment completed with service unavailability**

            🔗 **Preview URL:** ${previewUrl}

            ### ⚠️  Notice:
            Surge.sh appears to be experiencing service issues. The deployment was successful, but validation was skipped.

            The preview may become accessible once Surge.sh service is restored. You can try accessing the URL periodically to check if the service has recovered.

            ### What was deployed:
            - ✅ Standalone HTML build (same as production)
            - ✅ All assets embedded inline
            - ✅ Fully offline-capable
            - ✅ Production optimizations

            *Preview will be updated on each new commit to this PR.*

            ---
            *Deployed at ${new Date().toISOString()}*

            > 💡 **Note**: This is not a failure of the deployment process or your PR. This status check will not block merging.`;
            }

            await updateComment({
              github,
              context,
              header: 'Preview Deployment',
              body: comment,
              workflowYaml: 'cd-deploy-pr-preview.yml'
            });

      - name: Comment if deployment failed
        if: steps.deploy.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const updateComment = require('./.github/scripts/update-pr-comment.cjs');
            const comment = `The preview deployment could not be completed. This might be due to:
            - Missing SURGE_TOKEN secret
            - Build errors
            - Network issues

            Please check the workflow logs for details.`;

            await updateComment({
              github,
              context,
              header: 'Preview Deployment (Failed)',
              body: comment,
              workflowYaml: 'cd-deploy-pr-preview.yml'
            });

      - name: Generate job summary
        if: always()
        run: |
          echo "## 🚀 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DEPLOY_STATUS="${{ steps.deploy.outcome }}"
          PREVIEW_URL="${{ steps.deploy.outputs.preview_url }}"

          if [ "$DEPLOY_STATUS" == "success" ]; then
            echo "✅ **Deployed Successfully**" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [Open Preview]($PREVIEW_URL)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment Failed**" >> $GITHUB_STEP_SUMMARY
          fi
